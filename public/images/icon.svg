<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Subtle dark luxury background -->
  <rect width="512" height="512" rx="120" fill="#0c0a09"/>
  <rect width="512" height="512" rx="120" fill="none" stroke="rgba(212, 165, 116, 0.2)" stroke-width="8"/>
  
  <g transform="translate(106, 165)" stroke="url(#gradient)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- X -->
    <line x1="10" y1="10" x2="110" y2="182" />
    <line x1="110" y1="10" x2="10" y2="182" />
    <!-- Q -->
    <circle cx="224" cy="96" r="86" />
    <line x1="260" y1="140" x2="310" y2="192" />
  </g>

  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c9a0" />
      <stop offset="50%" stop-color="#d4a574" />
      <stop offset="100%" stop-color="#8b7355" />
